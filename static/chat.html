<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFM Tư Vấn Tuyển Sinh — Chat</title>
  <meta name="description" content="Chatbot tư vấn tuyển sinh Đại học Tài chính - Marketing (UFM)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════════ */
    :root {
      --bg:         #0b0d14;
      --surface:    #12151f;
      --surface-2:  #1a1e2e;
      --surface-3:  #222840;
      --border:     #262d44;
      --primary:    #6c5ce7;
      --primary-glow: rgba(108,92,231,.22);
      --accent:     #00cec9;
      --accent-glow: rgba(0,206,201,.15);
      --danger:     #ff6b6b;
      --success:    #51cf66;
      --text:       #e8ecf4;
      --text-dim:   #7b8399;
      --text-muted: #4a5270;
      --user-bg:    linear-gradient(135deg,#6c5ce7 0%,#a855f7 100%);
      --bot-bg:     #181c2e;
      --radius:     16px;
      --radius-sm:  10px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; }
    body {
      font-family:'Inter',-apple-system,sans-serif;
      background:var(--bg); color:var(--text);
      display:flex; flex-direction:column;
    }

    /* ═══════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════ */
    .header {
      background:linear-gradient(135deg,var(--surface) 0%,#1e1340 100%);
      border-bottom:1px solid var(--border);
      padding:14px 20px; display:flex; align-items:center; gap:12px;
      flex-shrink:0; z-index:10;
    }
    .header .avatar {
      width:42px; height:42px; border-radius:50%;
      background:var(--user-bg);
      display:flex; align-items:center; justify-content:center;
      font-size:20px; flex-shrink:0;
      box-shadow:0 0 18px var(--primary-glow);
    }
    .header .info h1 {
      font-size:15px; font-weight:700;
      background:linear-gradient(90deg,#e8ecf4,#a78bfa);
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .header .info p { font-size:11px; color:var(--text-dim); margin-top:1px; display:flex; align-items:center; gap:5px; }
    .header .dot { width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite; }
    @keyframes pulse {
      0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(81,207,102,.5)}
      50%{opacity:.7;box-shadow:0 0 0 6px rgba(81,207,102,0)}
    }
    .header .spacer { flex:1; }
    .btn-new {
      padding:5px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
      background:transparent; color:var(--text-dim); font-size:11px;
      font-family:inherit; cursor:pointer; transition:all .2s;
    }
    .btn-new:hover { border-color:var(--primary); color:var(--text); background:var(--primary-glow); }

    /* ═══════════════════════════════════════════════════════
       MESSAGES AREA
    ═══════════════════════════════════════════════════════ */
    .messages {
      flex:1; overflow-y:auto; padding:20px 14px;
      display:flex; flex-direction:column; gap:6px;
      scroll-behavior:smooth;
    }
    .messages::-webkit-scrollbar { width:5px; }
    .messages::-webkit-scrollbar-track { background:transparent; }
    .messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    /* ── Bubble ── */
    .msg { display:flex; gap:10px; max-width:82%; animation:msgIn .3s ease; }
    .msg.user { align-self:flex-end; flex-direction:row-reverse; }
    .msg.bot  { align-self:flex-start; }
    @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    .msg .bubble {
      padding:13px 17px; border-radius:var(--radius);
      font-size:14px; line-height:1.7; word-break:break-word; position:relative;
    }
    .msg.user .bubble {
      background:var(--user-bg); color:#fff;
      border-bottom-right-radius:4px;
    }
    .msg.bot .bubble {
      background:var(--bot-bg); border:1px solid var(--border);
      border-bottom-left-radius:4px;
    }
    .msg .bot-icon {
      width:30px;height:30px;border-radius:50%;
      background:var(--surface-3);display:flex;align-items:center;justify-content:center;
      font-size:16px;flex-shrink:0;margin-top:2px;
    }

    /* ── Metadata chips ── */
    .meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .chip {
      font-size:10px; padding:2px 8px; border-radius:12px;
      background:var(--surface-2); border:1px solid var(--border);
      color:var(--text-dim);
    }
    .chip.blocked { background:rgba(255,107,107,.15); border-color:var(--danger); color:var(--danger); }

    /* ── Markdown inside bubble ── */
    .bubble h1,.bubble h2,.bubble h3 { margin:10px 0 6px; font-weight:700; color:var(--text); }
    .bubble h1 { font-size:17px; }
    .bubble h2 { font-size:15px; }
    .bubble h3 { font-size:14px; }
    .bubble strong { color:#c4b5fd; }
    .bubble em { font-style:italic; color:var(--text-dim); }
    .bubble a { color:var(--accent); text-decoration:none; }
    .bubble a:hover { text-decoration:underline; }
    .bubble ul, .bubble ol { margin:6px 0 6px 20px; }
    .bubble li { margin-bottom:3px; }
    .bubble blockquote {
      border-left:3px solid var(--primary); padding:4px 12px;
      margin:6px 0; color:var(--text-dim); background:var(--surface);
      border-radius:0 var(--radius-sm) var(--radius-sm) 0;
    }
    .bubble pre {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:10px 14px;
      overflow-x:auto; margin:8px 0; font-size:12px;
    }
    .bubble code { font-family:'Cascadia Code','Fira Code',monospace; font-size:12px; }
    .bubble :not(pre)>code {
      background:var(--surface-2); padding:1px 5px; border-radius:4px; color:#c4b5fd;
    }
    .bubble table { border-collapse:collapse; margin:8px 0; width:100%; font-size:13px; }
    .bubble th, .bubble td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
    .bubble th { background:var(--surface-2); font-weight:600; }
    .bubble hr { border:none; border-top:1px solid var(--border); margin:10px 0; }

    /* ── Doc Link Card ── */
    .doc-link {
      display:flex; align-items:center; gap:10px;
      padding:8px 12px; margin:8px 0;
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--radius-sm); text-decoration:none !important;
      transition:all .2s;
    }
    .doc-link:hover {
      border-color:var(--primary); background:var(--primary-glow);
      transform:translateY(-1px);
    }
    .doc-link .doc-icon { font-size:20px; flex-shrink:0; }
    .doc-link .doc-info { display:flex; flex-direction:column; overflow:hidden; }
    .doc-link .doc-title { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .doc-link .doc-path { font-size:11px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ── Stream progress ── */
    .stream-box { display:flex; align-items:flex-start; gap:10px; align-self:flex-start; max-width:82%; animation:msgIn .3s ease; }
    .stream-box .bubble { background:var(--bot-bg); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; min-width:180px; }
    .sp-title { font-size:11px; color:var(--text-dim); margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .sp-spinner { width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .sp-steps { display:flex; flex-wrap:wrap; gap:5px; }
    .sp-step {
      font-size:11px; padding:3px 9px;
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:16px; color:var(--text-dim); animation:stepPop .2s ease;
    }
    .sp-step.active { background:var(--primary-glow); border-color:var(--primary); color:var(--text); }
    @keyframes stepPop { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:none} }

    /* ── Welcome ── */
    .welcome {
      margin:auto; text-align:center; padding:40px 20px;
      animation:msgIn .5s ease;
    }
    .welcome .logo { font-size:56px; margin-bottom:16px; }
    .welcome h2 { font-size:18px; font-weight:700; margin-bottom:8px; }
    .welcome p { font-size:13px; color:var(--text-dim); max-width:420px; margin:0 auto 20px; }
    .suggestions { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .sug {
      padding:8px 14px; border-radius:20px;
      border:1px solid var(--border); background:var(--surface-2);
      color:var(--text); font-size:12px; cursor:pointer;
      font-family:inherit; transition:all .2s;
    }
    .sug:hover { border-color:var(--primary); background:var(--primary-glow); transform:translateY(-1px); }

    /* ═══════════════════════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════════════════════ */
    .input-area {
      background:var(--surface); border-top:1px solid var(--border);
      padding:14px 16px; flex-shrink:0;
    }
    .input-wrap {
      display:flex; align-items:flex-end; gap:10px;
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--radius); padding:8px 12px;
      transition:border-color .2s;
    }
    .input-wrap:focus-within { border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-glow); }
    .input-wrap textarea {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-family:inherit; font-size:14px;
      resize:none; max-height:110px; line-height:1.5;
    }
    .input-wrap textarea::placeholder { color:var(--text-muted); }
    .send-btn {
      width:36px; height:36px; border-radius:50%;
      border:none; cursor:pointer;
      background:var(--user-bg); color:#fff;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:transform .15s, opacity .2s;
    }
    .send-btn:hover { transform:scale(1.08); }
    .send-btn:disabled { opacity:.4; cursor:default; transform:none; }
    .send-btn .spinner { width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite; }

    /* ── Responsive ── */
    @media(max-width:640px){
      .msg { max-width:92%; }
      .header { padding:10px 14px; }
      .input-area { padding:10px 12px; }
    }
  </style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<div class="header">
  <div class="avatar">🎓</div>
  <div class="info">
    <h1>UFM Tư Vấn Tuyển Sinh</h1>
    <p><span class="dot"></span> Trợ lý AI đang sẵn sàng</p>
  </div>
  <div class="spacer"></div>
  <button class="btn-new" onclick="newSession()" title="Bắt đầu phiên mới">🔄 Phiên mới</button>
</div>

<!-- ═══════════ MESSAGES ═══════════ -->
<div class="messages" id="messages">
  <div class="welcome" id="welcomeScreen">
    <div class="logo">🎓</div>
    <h2>Chào bạn! Mình là Trợ lý Tuyển sinh UFM</h2>
    <p>Mình có thể giúp bạn tìm hiểu về ngành học, học phí, điều kiện xét tuyển, và mọi thông tin về Đại học Tài chính - Marketing.</p>
    <div class="suggestions">
      <button class="sug" onclick="ask(this)">📚 Học phí ngành Marketing?</button>
      <button class="sug" onclick="ask(this)">🎯 Điểm chuẩn 2026?</button>
      <button class="sug" onclick="ask(this)">🏠 Có ký túc xá không?</button>
      <button class="sug" onclick="ask(this)">📋 Thủ tục nhập học?</button>
    </div>
  </div>
</div>

<!-- ═══════════ INPUT ═══════════ -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="chatInput" rows="1" placeholder="Nhập câu hỏi về tuyển sinh UFM..." maxlength="3000" oninput="autoGrow(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Gửi">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
const STREAM_URL  = '/api/v1/chat/stream';
const SESSION_KEY = 'ufm_chat_session_id';
const SESSION_ID  = (() => {
  let id = localStorage.getItem(SESSION_KEY);
  if (!id) { id = crypto.randomUUID?.() ?? ('ufm-'+Date.now()); localStorage.setItem(SESSION_KEY, id); }
  return id;
})();
let chatHistory = [];
let isLoading   = false;

/* ═══════════════════════════════════════════════════════════
   MARKDOWN RENDERER — Regex-based (no lib)
═══════════════════════════════════════════════════════════ */
function md(text) {
  if (!text) return '';
  let h = text;

  // ── Step 0: Protect {{ SOURCE: ... }} doc references ──
  const docRefs = [];
  h = h.replace(/\{\{\s*SOURCE:([\s\S]*?)\}\}/gi, (match) => {
    const idx = docRefs.length;
    
    const sourceMatch = match.match(/SOURCE:\s*([^\r\n]+)/i);
    const pathMatch = match.match(/PATH\s*\(([^\)]+)\)/i);
    const linkMatch = match.match(/\[([^\]]+)\]\(([^\)]+)\)/);
    
    const source = sourceMatch ? sourceMatch[1].trim() : 'Tài liệu tham khảo';
    let path = pathMatch ? pathMatch[1].trim() : '';
    if (path.toUpperCase().startsWith('NẰM Ở MỤC:')) {
       path = path.substring(10).trim();
    }
    let url = linkMatch ? linkMatch[2].trim() : '#';
    if (url.startsWith('/')) url = window.location.origin + url;
    
    docRefs.push({ source, path, url });
    return `⟬DOC_REF${idx}⟭`;
  });

  const links = [];

  // ── Step 0.5: Linkify bare source citations in text ──
  h = h.replace(/\[([^\]]+)\](?!\s*\()/g, (match, innerText) => {
    // Try to find a matching docRef
    const doc = docRefs.find(d => innerText.includes(d.source) || d.source.includes(innerText.trim()));
    if (doc) {
      const idx = links.length;
      const safeText = innerText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
      links.push({ text: safeText, url: doc.url });
      return `⟬LINK${idx}⟭`;
    }
    return match;
  });

// ── Step 1: Protect markdown links TRƯỚC khi escape HTML ──
  // Extract [text](url) → placeholder, xử lý cuối cùng
  // Regex nâng cấp: Chống gộp link, chấp nhận khoảng trắng giữa ] và (, chống lỗi ký tự ngoặc
  h = h.replace(/\[([^\]]+)\]\s*\(([^)\n]+)\)/g, (_, linkText, url) => {
    const idx = links.length;
    // Bắt buộc sanitize lại đoạn text của link để nó an toàn khi chèn vào cuối
    const safeText = linkText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    let finalUrl = url.trim();
    if (finalUrl.startsWith('/')) finalUrl = window.location.origin + finalUrl;
    links.push({ text: safeText, url: finalUrl });
    return `⟬LINK${idx}⟭`;
  });

  // ── Step 2: Protect bare URLs ──
  const bareUrls = [];
  h = h.replace(/(https?:\/\/[^\s<>\[\]"']+)/g, (_, url) => {
    const idx = bareUrls.length;
    bareUrls.push(url);
    return `⟬BARE${idx}⟭`;
  });

  // Escape HTML (safe vì links đã được protect)
  h = h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Code blocks ```lang\n...\n```
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang||'text'}">${code.trim()}</code></pre>`);

  // Inline code
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headings
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,   '<h1>$1</h1>');

  // Bold + italic
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
  h = h.replace(/__(.+?)__/g,         '<strong>$1</strong>');
  h = h.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

  // Blockquote
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // HR
  h = h.replace(/^(---|___|\*\*\*)$/gm, '<hr>');

  // Tables
  h = h.replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)+)/gm, (_, hdr, sep, body) => {
    const ths = hdr.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
    const rows = body.trim().split('\n').map(r => {
      const tds = r.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // Unordered lists (- item or * item)
  h = h.replace(/^[\-\*] (.+)$/gm, '⟬LI⟭$1⟬/LI⟭');
  h = h.replace(/((?:⟬LI⟭.*?⟬\/LI⟭\n?)+)/g, m =>
    '<ul>' + m.replace(/⟬LI⟭(.*?)⟬\/LI⟭/g, '<li>$1</li>') + '</ul>');

  // Ordered lists (1. item)
  h = h.replace(/^\d+\. (.+)$/gm, '⟬OLI⟭$1⟬/OLI⟭');
  h = h.replace(/((?:⟬OLI⟭.*?⟬\/OLI⟭\n?)+)/g, m =>
    '<ol>' + m.replace(/⟬OLI⟭(.*?)⟬\/OLI⟭/g, '<li>$1</li>') + '</ol>');

  // Paragraphs / line breaks
  h = h.replace(/\n\n/g, '<br><br>');
  h = h.replace(/\n/g, '<br>');

  // Cleanup
  h = h.replace(/<br><\/ul>/g,'</ul>').replace(/<br><\/ol>/g,'</ol>');
  h = h.replace(/<ul><br>/g,'<ul>').replace(/<ol><br>/g,'<ol>');
  h = h.replace(/<br>(<h[1-3]>)/g,'$1').replace(/(<\/h[1-3]>)<br>/g,'$1');
  h = h.replace(/<br>(<table>)/g,'$1').replace(/(<\/table>)<br>/g,'$1');
  h = h.replace(/<br>(<pre>)/g,'$1').replace(/(<\/pre>)<br>/g,'$1');
  h = h.replace(/<br>(<blockquote>)/g,'$1').replace(/(<\/blockquote>)<br>/g,'$1');
  h = h.replace(/<br>(<hr>)/g,'$1').replace(/(<hr>)<br>/g,'$1');

  // ── Step 3: Restore links ──
  // Doc refs -> custom card
  h = h.replace(/⟬DOC_REF(\d+)⟭/g, (_, idx) => {
    const doc = docRefs[parseInt(idx)];
    return `<a href="${doc.url}" target="_blank" rel="noopener" class="doc-link">
      <span class="doc-icon">📄</span>
      <span class="doc-info">
        <span class="doc-title">${doc.source}</span>
        ${doc.path ? `<span class="doc-path">${doc.path}</span>` : ''}
      </span>
    </a>`;
  });

  // Markdown links → clickable <a> with 🔗 icon
  h = h.replace(/⟬LINK(\d+)⟭/g, (_, idx) => {
    const link = links[parseInt(idx)];
    return `<a href="${link.url}" target="_blank" rel="noopener">${link.text} 🔗</a>`;
  });

  // Bare URLs → clickable <a>
  h = h.replace(/⟬BARE(\d+)⟭/g, (_, idx) => {
    const url = bareUrls[parseInt(idx)];
    let display;
    try { display = new URL(url).hostname; } catch { display = url.substring(0, 40); }
    return `<a href="${url}" target="_blank" rel="noopener">${display} 🔗</a>`;
  });

  return h;
}

function esc(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

/* ═══════════════════════════════════════════════════════════
   SEND MESSAGE — SSE Stream
═══════════════════════════════════════════════════════════ */
async function sendMessage() {
  const el = document.getElementById('chatInput');
  const query = el.value.trim();
  if (!query || isLoading) return;

  // Hide welcome
  const w = document.getElementById('welcomeScreen');
  if (w) w.remove();

  // User bubble
  appendUser(query);
  chatHistory.push({role:'user', content:query});
  el.value = ''; el.style.height = 'auto';

  // Loading state
  isLoading = true;
  setBtnLoading(true);
  const progress = showProgress();
  const steps = [];

  try {
    const res = await fetch(STREAM_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ query, chat_history: chatHistory.slice(-20), session_id: SESSION_ID }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '', result = null;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const p of parts) {
        if (!p.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(p.slice(6));
          if (ev.type === 'node')   { steps.push(ev.label); updateProgress(progress, steps); }
          else if (ev.type === 'result') result = ev;
          else if (ev.type === 'error')  throw new Error(ev.message);
        } catch(_){}
      }
    }

    progress.remove();
    if (result) {
      appendBot(result.response, {
        intent: result.intent,
        intent_action: result.intent_action,
        source: result.source,
        elapsed: result.elapsed_seconds,
        blocked: result.blocked,
        blocked_reason: result.blocked_reason,
      });
      let contentToSave = result.history_content || result.response;
      contentToSave = contentToSave.replace(/\{\{\s*SOURCE:[\s\S]*?\}\}/gi, '').trim();
      chatHistory.push({role:'assistant', content: contentToSave});
    } else {
      appendBot('⚠️ Không nhận được phản hồi.', {source:'error'});
    }
  } catch(e) {
    progress.remove();
    appendBot(`⚠️ ${e.message}`, {source:'error'});
  } finally {
    isLoading = false;
    setBtnLoading(false);
  }
}

function ask(btn) {
  document.getElementById('chatInput').value =
    btn.textContent.replace(/^[\s\p{Emoji_Presentation}\p{Extended_Pictographic}]+/u,'').trim();
  sendMessage();
}

/* ═══════════════════════════════════════════════════════════
   DOM HELPERS
═══════════════════════════════════════════════════════════ */
const container = () => document.getElementById('messages');
const scroll    = () => { const c = container(); c.scrollTop = c.scrollHeight; };

function appendUser(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  container().appendChild(d); scroll();
}

function appendBot(text, meta={}) {
  const d = document.createElement('div');
  d.className = 'msg bot';
  let chips = '';
  if (meta.intent || meta.source || meta.elapsed !== undefined) {
    chips = '<div class="meta">';
    if (meta.blocked) chips += `<span class="chip blocked">🚫 Blocked</span>`;
    if (meta.blocked_reason) chips += `<span class="chip blocked">${meta.blocked_reason.substring(0,50)}</span>`;
    if (meta.intent && meta.intent !== 'BLOCKED') chips += `<span class="chip">🧭 ${meta.intent}</span>`;
    if (meta.intent_action) chips += `<span class="chip">⚡ ${meta.intent_action}</span>`;
    if (meta.source) chips += `<span class="chip">📡 ${meta.source}</span>`;
    if (meta.elapsed != null) chips += `<span class="chip">⏱ ${meta.elapsed.toFixed(2)}s</span>`;
    chips += '</div>';
  }
  d.innerHTML = `
    <div class="bot-icon">🎓</div>
    <div class="bubble">${md(text)}${chips}</div>`;
  container().appendChild(d); scroll();
}

function showProgress() {
  const d = document.createElement('div');
  d.className = 'stream-box';
  d.innerHTML = `
    <div class="bot-icon">🎓</div>
    <div class="bubble">
      <div class="sp-title"><div class="sp-spinner"></div><span>Đang xử lý...</span></div>
      <div class="sp-steps"></div>
    </div>`;
  container().appendChild(d); scroll();
  return d;
}

function updateProgress(el, steps) {
  const box = el.querySelector('.sp-steps');
  if (!box) return;
  const prev = box.querySelector('.sp-step.active');
  if (prev) prev.classList.remove('active');
  const s = document.createElement('span');
  s.className = 'sp-step active';
  s.textContent = steps[steps.length - 1];
  box.appendChild(s); scroll();
}

function setBtnLoading(on) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<div class="spinner"></div>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>';
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function newSession() {
  if (!confirm('Bắt đầu phiên mới? Lịch sử sẽ được xóa.')) return;
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

// ── Keyboard ──
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('chatInput').focus();
</script>

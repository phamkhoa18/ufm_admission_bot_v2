# 🔴 FALLBACK MESSAGES — Tin nhắn trả thẳng (không gọi LLM)
# ⚠️ Hotline/contact info được Python tự gắn vào cuối — KHÔNG hardcode ở đây
fallback_messages:
  # Layer 0: Input quá dài
  too_long: |
    Kính chào bạn,
    Cảm ơn bạn đã đặt câu hỏi. Tuy nhiên, nội dung câu hỏi hiện tại khá dài (vượt quá 3000 ký tự), nên có thể gây khó khăn trong việc xử lý và phản hồi một cách chính xác nhất.
    Bạn vui lòng tóm tắt lại những ý chính hoặc câu hỏi trọng tâm để mình có thể hỗ trợ bạn nhanh chóng và hiệu quả hơn nhé.

  # ============================
  # KHO TIN NHẮN CHUNG
  # ============================
  common_rejection: *COMMON_REJECTION

  # ----------------------------
  # CÁC NODE KẾ THỪA TIN NHẮN
  # ----------------------------
  # Layer 1a: Từ khóa nhạy cảm
  banned_content: *COMMON_REJECTION

  # Layer 1b: Injection/Jailbreak
  injection: *COMMON_REJECTION

  # Layer 2a: Llama Guard score cao
  guard_fast_unsafe: *COMMON_REJECTION

  # Layer 2b: Qwen Deep phát hiện UNSAFE
  guard_deep_unsafe: *COMMON_REJECTION

  # Intent Nhóm 4: Block Fallback Messages (chỉ giữ lại out_of_scope được trỏ từ intent.py)
  out_of_scope: *COMMON_REJECTION

  doi_hoi_cam_ket: >
    Cơ hội nghề nghiệp phụ thuộc vào năng lực và sự nỗ lực của bạn.
    Mình không thể cam kết tuyệt đối, nhưng chương trình UFM luôn sát nhu cầu doanh nghiệp.
    Bạn muốn tìm hiểu chương trình đào tạo cụ thể của ngành nào?


# 💬 RESPONSE TEMPLATES — Trả về ngay, random 1 trong list
response_templates:
  GREET:
    - "Dạ hello bạn! 👋 Mình là trợ lý tư vấn tuyển sinh của Đại học Tài chính - Marketing (UFM) đây. Bạn đang quan tâm đến ngành học nào, hay cần xem học phí, điểm chuẩn ạ? Cứ hỏi mình nhé!"
    - "Chào bạn nha! 😊 Mình là bot hỗ trợ xét tuyển của UFM. Bạn cần tư vấn về điều kiện tuyển sinh hay chương trình đào tạo nào thì cứ nhắn tự nhiên nha, mình giải đáp hết!"
    - "Xin chào 🎓! Mình là Trợ lý Tuyển sinh của UFM. Hiện bạn đang băn khoăn về quy chế xét tuyển hay muốn tìm hiểu ngành học phù hợp vậy ạ?"

  CLARIFY:
    - "Cảm ơn bạn đã đặt câu hỏi, mình chưa hiểu muốn hỏi cụ thể về ngành nào hay chủ đề gì (học phí, xét học bạ, điểm chuẩn...) vậy ạ?"
    - "Mình thấy câu hỏi có vẻ chưa được trọn vẹn á. Bạn có thể nói cụ thể hơn một xíu để mình tư vấn cho chuẩn nhất không nha? 😊"
    - "Cho mình hỏi thêm xíu, bạn đang quan tâm đến ngành học cụ thể nào hay thắc mắc về vấn đề nào ở UFM vậy ạ? Bạn gõ rõ hơn giúp mình nhé!"




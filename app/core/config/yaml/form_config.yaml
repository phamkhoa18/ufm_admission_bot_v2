# ============================================================
# FORM AGENT CONFIG — Định nghĩa fields trích xuất thông tin
# File: app/core/config/yaml/form_config.yaml
#
# ⚠️ Model config (selector, extractor, drafter) → models_config.yaml
# ⚠️ Prompt config (system_prompt, user_prompt) → prompts_config.yaml
# ⚠️ Danh mục mẫu đơn → Selector tự quét metadata từ maudon/*.md
# ⚠️ File này CHỈ còn: fields (gợi ý key cho Extractor)
